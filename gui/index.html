<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Vibes Music</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Good Vibes Music</h1>
      <input
        type="text"
        id="search-input"
        placeholder="Search tracks, artists, or albums..."
      />
      <div class="controls">
        <button id="add-music-btn">+ Add Music</button>
      </div>
    </header>

    <main class="library-container">
      <div class="list-header" id="list-header">
        <div class="col-cover"></div>
        <div class="col-sortable" data-sort="title">Title</div>
        <div class="col-sortable" data-sort="artist">Artist</div>
        <div class="col-sortable" data-sort="album">Album</div>
        <div class="col-sortable" data-sort="year">Year</div>
        <div class="col-sortable" data-sort="duration">Time</div>
        <div class="col-remove"></div>
      </div>
      <ul id="track-list"></ul>
    </main>

    <footer class="player-bar">
      <div class="now-playing">
        <img
          id="np-cover"
          src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23b3b3b3'><path d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/></svg>"
          alt="Cover"
        />
        <div class="np-info">
          <div id="np-title">No track selected</div>
          <div id="np-artist">-</div>
        </div>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button id="shuffle-btn" class="icon-btn">🔀</button>
          <button id="prev-btn" class="icon-btn">⏮</button>
          <button id="play-pause-btn">▶ Play</button>
          <button id="next-btn" class="icon-btn">⏭</button>
          <button id="repeat-btn" class="icon-btn">🔁</button>
        </div>
        <div class="progress-container">
          <span id="current-time">0:00</span>
          <input
            type="range"
            id="progress-bar"
            value="0"
            min="0"
            max="100"
            step="1"
          />
          <span id="total-time">0:00</span>
        </div>
      </div>

      <div class="volume-container">
        <span style="font-size: 18px">🔊</span>
        <input
          type="range"
          id="volume-bar"
          value="1"
          min="0"
          max="1"
          step="0.01"
        />
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
