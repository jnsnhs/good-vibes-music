<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Vibes Music</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="menu-bar" id="display-options">
      <div style="display: flex; gap: 15px; align-items: center">
        <div class="view-toggles" style="display: flex; gap: 5px">
          <button id="toggle-list-btn" class="view-btn active">Songs</button>
          <button id="toggle-grid-btn" class="view-btn">Albums</button>
        </div>
        <button
          id="grid-settings-btn"
          class="icon-btn hidden"
          title="Grid Settings"
        >
          ⚙️
        </button>
      </div>
      <div id="status-text" style="display: none">0 tracks in library</div>
      <div id="search-input-container">
        <input
          type="search"
          id="search-input"
          placeholder="Search library..."
          spellcheck="false"
        />
      </div>
      <button id="add-music-btn">Add Music</button>
    </header>

    <main class="library-container">
      <div
        id="list-view-wrapper"
        style="display: flex; flex-direction: column; height: 100%"
      >
        <div class="list-header" id="list-header">
          <div class="col-cover"></div>
          <div class="col-sortable" data-sort="title">Title</div>
          <div class="col-sortable" data-sort="artist">Artist</div>
          <div class="col-sortable" data-sort="album">Album</div>
          <div class="col-sortable" data-sort="year">Year</div>
          <div class="col-sortable" data-sort="duration">Time</div>
          <div class="col-remove"></div>
        </div>
        <div id="track-list-container">
          <ul id="track-list"></ul>
        </div>
      </div>

      <div
        id="grid-view-wrapper"
        class="hidden"
        style="height: 100%; overflow-y: auto"
      >
        <div id="album-grid"></div>
      </div>
    </main>

    <footer class="control-bar">
      <div class="playback-container">
        <button id="prev-btn" class="icon-btn" title="Previous Track">
          <svg class="btn-icon" viewBox="0 -960 960 960">
            <path
              d="M220-280v-400q0-17 11.5-28.5T260-720q17 0 28.5 11.5T300-680v400q0 17-11.5 28.5T260-240q-17 0-28.5-11.5T220-280Zm458-1L430-447q-9-6-13.5-14.5T412-480q0-10 4.5-18.5T430-513l248-166q5-4 11-5t11-1q16 0 28 11t12 29v330q0 18-12 29t-28 11q-5 0-11-1t-11-5Z"
            />
          </svg>
        </button>
        <button id="play-pause-btn" class="icon-btn" title="Play/Pause">
          <svg class="btn-icon" viewBox="0 -960 960 960">
            <path
              d="M320-273v-414q0-17 12-28.5t28-11.5q5 0 10.5 1.5T381-721l326 207q9 6 13.5 15t4.5 19q0 10-4.5 19T707-446L381-239q-5 3-10.5 4.5T360-233q-16 0-28-11.5T320-273Z"
            />
          </svg>
        </button>
        <button id="next-btn" class="icon-btn" title="Next Track">
          <svg class="btn-icon" viewBox="0 -960 960 960">
            <path
              d="M660-280v-400q0-17 11.5-28.5T700-720q17 0 28.5 11.5T740-680v400q0 17-11.5 28.5T700-240q-17 0-28.5-11.5T660-280Zm-440-35v-330q0-18 12-29t28-11q5 0 11 1t11 5l248 166q9 6 13.5 14.5T548-480q0 10-4.5 18.5T530-447L282-281q-5 4-11 5t-11 1q-16 0-28-11t-12-29Z"
            />
          </svg>
        </button>
      </div>

      <div class="now-playing-container">
        <img id="np-cover" src="placeholder.png" alt="Cover" />
        <div class="np-info">
          <span id="np-title">No track selected</span>
          <span id="np-artist">-</span>
        </div>
      </div>

      <div class="progress-container">
        <span id="current-time">0:00</span>
        <input
          type="range"
          id="progress-bar"
          class="slider-progress"
          value="0"
          min="0"
          max="100"
          step="1"
        />
        <span id="total-time">0:00</span>
      </div>

      <div class="playback-modes-container">
        <button id="shuffle-btn" class="icon-btn" title="Shuffle">
          <svg class="btn-icon" viewBox="0 -960 960 960">
            <path
              d="M600-160q-17 0-28.5-11.5T560-200q0-17 11.5-28.5T600-240h64l-99-99q-12-12-11.5-28.5T566-396q12-12 28.5-12t28.5 12l97 98v-62q0-17 11.5-28.5T760-400q17 0 28.5 11.5T800-360v160q0 17-11.5 28.5T760-160H600Zm-428-12q-11-11-11-28t11-28l492-492h-64q-17 0-28.5-11.5T560-760q0-17 11.5-28.5T600-800h160q17 0 28.5 11.5T800-760v160q0 17-11.5 28.5T760-560q-17 0-28.5-11.5T720-600v-64L228-172q-11 11-28 11t-28-11Zm-1-560q-11-11-11-28t11-28q11-11 27.5-11t28.5 11l168 167q11 11 11.5 27.5T395-565q-11 11-28 11t-28-11L171-732Z"
            />
          </svg>
        </button>
        <button id="repeat-btn" class="icon-btn" title="Repeat">
          <svg class="btn-icon" viewBox="0 -960 960 960">
            <path
              d="m274-200 34 34q12 12 11.5 28T308-110q-12 12-28.5 12.5T251-109L148-212q-6-6-8.5-13t-2.5-15q0-8 2.5-15t8.5-13l103-103q12-12 28.5-11.5T308-370q11 12 11.5 28T308-314l-34 34h406v-120q0-17 11.5-28.5T720-440q17 0 28.5 11.5T760-400v120q0 33-23.5 56.5T680-200H274Zm412-480H280v120q0 17-11.5 28.5T240-520q-17 0-28.5-11.5T200-560v-120q0-33 23.5-56.5T280-760h406l-34-34q-12-12-11.5-28t11.5-28q12-12 28.5-12.5T709-851l103 103q6 6 8.5 13t2.5 15q0 8-2.5 15t-8.5 13L709-589q-12 12-28.5 11.5T652-590q-11-12-11.5-28t11.5-28l34-34Z"
            />
          </svg>
        </button>
        <button id="queue-btn" class="icon-btn" title="Queue">
          <svg class="btn-icon" viewBox="0 -960 960 960">
            <path
              d="M640-160q-50 0-85-35t-35-85q0-50 35-85t85-35q11 0 21 1.5t19 6.5v-288q0-17 11.5-28.5T720-720h120q17 0 28.5 11.5T880-680q0 17-11.5 28.5T840-640h-80v360q0 50-35 85t-85 35ZM160-320q-17 0-28.5-11.5T120-360q0-17 11.5-28.5T160-400h240q17 0 28.5 11.5T440-360q0 17-11.5 28.5T400-320H160Zm0-160q-17 0-28.5-11.5T120-520q0-17 11.5-28.5T160-560h400q17 0 28.5 11.5T600-520q0 17-11.5 28.5T560-480H160Zm0-160q-17 0-28.5-11.5T120-680q0-17 11.5-28.5T160-720h400q17 0 28.5 11.5T600-680q0 17-11.5 28.5T560-640H160Z"
            />
          </svg>
        </button>
      </div>

      <div class="volume-container">
        <button
          id="normalize-btn"
          class="icon-btn"
          title="Toggle Volume Normalization"
        >
          🔊
        </button>
        <input
          type="range"
          id="volume-bar"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>
    </footer>

    <div id="context-menu" class="hidden">
      <div class="context-item" id="ctx-play-next">Play Next</div>
      <div class="context-item" id="ctx-edit">Edit Metadata</div>
      <div class="context-item delete-text" id="ctx-remove">
        Remove from Library
      </div>
    </div>

    <div id="edit-modal-overlay" class="hidden">
      <div class="modal-content">
        <h2>Edit Metadata</h2>
        <div class="edit-grid">
          <div class="input-group">
            <label>Title</label>
            <input type="text" id="edit-title" />
          </div>
          <div class="input-group">
            <label>Artist</label>
            <input type="text" id="edit-artist" />
          </div>
          <div class="input-group">
            <label>Album</label>
            <input type="text" id="edit-album" />
          </div>
          <div class="input-group">
            <label>Album Artist</label>
            <input type="text" id="edit-album_artist" />
          </div>
          <div class="input-group">
            <label>Genre</label>
            <input type="text" id="edit-genre" />
          </div>
          <div class="input-group">
            <label>Year</label>
            <input type="text" id="edit-year" />
          </div>
          <div class="input-group">
            <label>Track #</label>
            <input type="text" id="edit-track_num" />
          </div>
          <div class="input-group">
            <label>Disc #</label>
            <input type="text" id="edit-disc_num" />
          </div>
          <div class="input-group full-width">
            <label>Comments</label>
            <input type="text" id="edit-comments" />
          </div>
          <div class="input-group full-width checkbox-group">
            <input type="checkbox" id="edit-compilation" />
            <label for="edit-compilation">Part of a compilation</label>
          </div>
        </div>
        <div class="modal-actions">
          <button id="btn-cancel-edit" class="secondary-btn">Cancel</button>
          <button id="btn-save-edit" class="primary-btn">Save Changes</button>
        </div>
      </div>
    </div>

    <div id="queue-popover" class="hidden">
      <div class="queue-header">
        <h3>Up Next</h3>
        <button id="clear-queue-btn" class="text-btn">Clear</button>
      </div>
      <ul id="queue-list"></ul>
      <div id="queue-footer" class="hidden">... and 0 more tracks</div>
    </div>

    <div id="import-progress-container" class="hidden">
      <div class="progress-header">
        <span>Importing Music...</span>
        <span id="import-count">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div id="import-progress-fill"></div>
      </div>
    </div>

    <div id="grid-settings-modal" class="hidden">
      <div class="modal-content" style="width: 350px">
        <h2>Album Grid Settings</h2>

        <div style="margin-bottom: 20px">
          <label
            style="
              font-size: 11px;
              color: var(--text-secondary);
              text-transform: uppercase;
            "
            >Sort Order</label
          >
          <div
            style="
              margin-top: 8px;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <label style="font-size: 13px; cursor: pointer">
              <input type="radio" name="grid-sort" value="artist" checked />
              Artist, then Year
            </label>
            <label style="font-size: 13px; cursor: pointer">
              <input type="radio" name="grid-sort" value="year" /> Year, then
              Artist
            </label>
          </div>
        </div>

        <div style="margin-bottom: 20px">
          <label
            style="
              font-size: 11px;
              color: var(--text-secondary);
              text-transform: uppercase;
            "
            >Sort Direction</label
          >
          <div style="margin-top: 8px; display: flex; gap: 15px">
            <label style="font-size: 13px; cursor: pointer">
              <input type="radio" name="grid-sort-dir" value="asc" checked />
              Ascending
            </label>
            <label style="font-size: 13px; cursor: pointer">
              <input type="radio" name="grid-sort-dir" value="desc" />
              Descending
            </label>
          </div>
        </div>

        <div style="margin-bottom: 20px">
          <label
            style="
              font-size: 11px;
              color: var(--text-secondary);
              text-transform: uppercase;
            "
            >Display Options</label
          >
          <div style="margin-top: 8px">
            <label
              style="
                font-size: 13px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
              "
            >
              <input type="checkbox" id="grid-show-subheadings" /> Show Group
              Subheadings
            </label>
            <label
              style="
                font-size: 13px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 8px;
              "
            >
              <input type="checkbox" id="grid-sticky-subheadings" /> Sticky
              Subheadings
            </label>
          </div>
        </div>

        <div class="modal-actions">
          <button id="btn-cancel-grid-settings" class="secondary-btn">
            Cancel
          </button>
          <button id="btn-save-grid-settings" class="primary-btn">Save</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
