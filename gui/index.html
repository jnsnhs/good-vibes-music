<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Vibes Music</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <input type="text" id="search-input" placeholder="Search library..." />
      <button id="add-music-btn">Add Music</button>
    </header>

    <main class="library-container">
      <div class="list-header" id="list-header">
        <div class="col-cover"></div>
        <div class="col-sortable" data-sort="title">Title</div>
        <div class="col-sortable" data-sort="artist">Artist</div>
        <div class="col-sortable" data-sort="album">Album</div>
        <div class="col-sortable" data-sort="year">Year</div>
        <div class="col-sortable" data-sort="duration">Time</div>
        <div class="col-remove"></div>
      </div>
      <div id="track-list-container">
        <ul id="track-list"></ul>
      </div>
    </main>

    <footer class="player-bar">
      <div class="now-playing">
        <img
          id="np-cover"
          src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23b3b3b3'><path d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/></svg>"
          alt="Cover"
        />
        <div class="np-info">
          <div id="np-title">No track selected</div>
          <div id="np-artist">-</div>
        </div>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button id="shuffle-btn" class="icon-btn">🔀</button>
          <button id="prev-btn" class="icon-btn">⏮</button>
          <button id="play-pause-btn">▶ Play</button>
          <button id="next-btn" class="icon-btn">⏭</button>
          <button id="repeat-btn" class="icon-btn">🔁</button>
        </div>
        <div class="progress-container">
          <span id="current-time">0:00</span>
          <input
            type="range"
            id="progress-bar"
            value="0"
            min="0"
            max="100"
            step="1"
          />
          <span id="total-time">0:00</span>
        </div>
      </div>

      <div class="volume-container">
        <button
          id="normalize-btn"
          class="icon-btn"
          title="Toggle Volume Normalization"
        >
          🔊
        </button>
        <input
          type="range"
          id="volume-bar"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>
    </footer>

    <div id="context-menu" class="hidden">
      <div class="context-item" id="ctx-edit">Edit Metadata</div>
      <div class="context-item delete-text" id="ctx-remove">
        Remove from Library
      </div>
    </div>

    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Edit Track Info</h3>

        <div class="input-group">
          <label>Title</label>
          <input type="text" id="edit-title" />
        </div>

        <div class="input-group">
          <label>Artist</label>
          <input type="text" id="edit-artist" />
        </div>

        <div class="input-group">
          <label>Year</label>
          <input type="text" id="edit-year" />
        </div>

        <div class="modal-actions">
          <button id="save-edit-btn">Save to File</button>
          <button id="cancel-edit-btn" class="secondary-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div id="import-progress-container" class="hidden">
      <div class="progress-header">
        <span>Importing Music...</span>
        <span id="import-count">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div id="import-progress-fill"></div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
