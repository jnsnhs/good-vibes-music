<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Vibes Music</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header class="app-header">
      <div class="header-left">
        <div class="playback-container">
          <button id="prev-btn" class="icon-btn" title="Previous Track">⏮</button>
          <button id="play-pause-btn" class="icon-btn" title="Play/Pause">▶</button>
          <button id="next-btn" class="icon-btn" title="Next Track">⏭</button>
        </div>

        <div class="volume-container">
          <!-- <button
            id="normalize-btn"
            class="icon-btn"
            title="Toggle Volume Normalization"
          >
            🔊
          </button> -->
          <input
            type="range"
            id="volume-bar"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />
        </div>
      </div>

      <div class="header-center">

        <button id="shuffle-btn" class="icon-btn" title="Shuffle">🔀</button>
        <div class="center-now-playing">
          <img
            id="np-cover"
            src="placeholder.png"
            alt="Cover"
          />
          <div class="np-info">
            <span id="np-title">No track selected</span>
            <span id="np-artist">-</span>
          </div>
        </div>
        <button id="repeat-btn" class="icon-btn" title="Repeat">🔁</button>

        <div class="progress-container">
          <span id="current-time">0:00</span>
          <input
            type="range"
            id="progress-bar"
            value="0"
            min="0"
            max="100"
            step="1"
          />
          <span id="total-time">0:00</span>
        </div>

      </div>

      <div class="header-right">
        <input
          type="search"
          id="search-input"
          placeholder="Search library..."
          spellcheck="false"
        />
      </div>
    </header>

    <main class="library-container">
      <div
        id="list-view-wrapper"
        style="display: flex; flex-direction: column; height: 100%"
      >
        <div class="list-header" id="list-header">
          <div class="col-cover"></div>
          <div class="col-sortable" data-sort="title">Title</div>
          <div class="col-sortable" data-sort="artist">Artist</div>
          <div class="col-sortable" data-sort="album">Album</div>
          <div class="col-sortable" data-sort="year">Year</div>
          <div class="col-sortable" data-sort="duration">Time</div>
          <div class="col-remove"></div>
        </div>
        <div id="track-list-container">
          <ul id="track-list"></ul>
        </div>
      </div>

      <div
        id="grid-view-wrapper"
        class="hidden"
        style="height: 100%; overflow-y: auto"
      >
        <div id="album-grid"></div>
      </div>
    </main>

    <footer class="status-bar">
      <div>
        <button id="add-music-btn">Add Music</button>
      </div>
      <div id="status-text">0 tracks in library</div>
      <div class="view-toggles" style="display: flex; gap: 5px">
        <button id="toggle-list-btn" class="view-btn active">Songs</button>
        <button id="toggle-grid-btn" class="view-btn">Albums</button>
      </div>
    </footer>

    <div id="context-menu" class="hidden">
      <div class="context-item" id="ctx-edit">Edit Metadata</div>
      <div class="context-item delete-text" id="ctx-remove">
        Remove from Library
      </div>
    </div>

    <div id="edit-modal-overlay" class="hidden">
      <div class="modal-content">
        <h2>Edit Metadata</h2>
        <div class="edit-grid">
          <div class="input-group">
            <label>Title</label>
            <input type="text" id="edit-title" />
          </div>
          <div class="input-group">
            <label>Artist</label>
            <input type="text" id="edit-artist" />
          </div>
          <div class="input-group">
            <label>Album</label>
            <input type="text" id="edit-album" />
          </div>
          <div class="input-group">
            <label>Album Artist</label>
            <input type="text" id="edit-album_artist" />
          </div>
          <div class="input-group">
            <label>Genre</label>
            <input type="text" id="edit-genre" />
          </div>
          <div class="input-group">
            <label>Year</label>
            <input type="text" id="edit-year" />
          </div>
          <div class="input-group">
            <label>Track #</label>
            <input type="text" id="edit-track_num" />
          </div>
          <div class="input-group">
            <label>Disc #</label>
            <input type="text" id="edit-disc_num" />
          </div>
          <div class="input-group full-width">
            <label>Comments</label>
            <input type="text" id="edit-comments" />
          </div>
          <div class="input-group full-width checkbox-group">
            <input type="checkbox" id="edit-compilation" />
            <label for="edit-compilation">Part of a compilation</label>
          </div>
        </div>
        <div class="modal-actions">
          <button id="btn-cancel-edit" class="secondary-btn">Cancel</button>
          <button id="btn-save-edit" class="primary-btn">Save Changes</button>
        </div>
      </div>
    </div>

    <div id="import-progress-container" class="hidden">
      <div class="progress-header">
        <span>Importing Music...</span>
        <span id="import-count">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div id="import-progress-fill"></div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
